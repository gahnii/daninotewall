<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>dani note wall</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <div class="brandtext">
        <div class="title">dani note wall</div>
        <div class="subtitle" id="statusLine">public board • tap to edit • drag to move • pinch zoom</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="btnNew">new note</button>
      <button class="btn" id="btnCenter">center</button>
      <button class="btn" id="btnRefresh">refresh</button>
    </div>
  </header>

  <main class="stageWrap">
    <div id="stage" class="stage" aria-label="note board">
      <div id="world" class="world"></div>
    </div>
  </main>

  <div id="toast" class="toast" hidden></div>

  <div id="modal" class="modal" hidden>
    <div class="sheet">
      <div class="sheetHead">
        <div class="sheetTitle">edit note</div>
        <button class="iconBtn" id="btnClose" aria-label="Close">✕</button>
      </div>

      <textarea id="editText" class="editArea" maxlength="500" placeholder="write something…"></textarea>

      <div class="row">
        <label class="label">color</label>
        <select id="editColor" class="select">
          <option value="note1">note1</option>
          <option value="note2">note2</option>
          <option value="note3">note3</option>
        </select>
      </div>

      <div class="sheetActions">
        <button class="btn danger" id="btnDelete">delete</button>
        <div class="spacer"></div>
        <button class="btn" id="btnSave">save</button>
      </div>

      <div class="hint">
        moving is public. editing/deleting requires your local key (same device/browser).
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
