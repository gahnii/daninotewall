
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw</title>
<style>
body{
  margin:0;
  background:#0b1220;
  font-family:monospace;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#topbar{
  background:#111827;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

button{
  background:#1f2937;
  color:white;
  border:1px solid #334155;
  padding:6px 10px;
  cursor:pointer;
}

button.active{
  border-color:#3b82f6;
}

#canvasWrap{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

canvas{
  background:#111;
  border:1px solid #334155;
  touch-action:none;
  max-width:100%;
  max-height:100%;
}
</style>
</head>
<body>

<div id="topbar">
  <label>Brush <input type="range" id="brush" min="1" max="30" value="5"></label>
  <input type="color" id="color" value="#ffffff">
  <button id="penBtn" class="active">Pen</button>
  <button id="eraserBtn">Eraser</button>
  <button id="bgGrid">Grid</button>
  <button id="bgPaper">Paper</button>
  <button id="bgDark">Dark</button>
  <input id="caption" placeholder="caption (optional 80 chars)" maxlength="80">
  <button id="publish">Publish</button>
</div>

<div id="canvasWrap">
  <canvas id="canvas" width="1200" height="800"></canvas>
</div>

<script src="draw.js"></script>
</body>
</html>
