
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:monospace;
}
h1{padding:20px;}
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:#111827;
  padding:10px;
  border:1px solid #334155;
}
img{width:100%;}
.small{font-size:12px;color:#9ca3af;}
</style>
</head>
<body>

<h1>Public Drawings</h1>
<div id="grid"></div>

<script>
async function load(){
  const res=await fetch("/api/drawing");
  const data=await res.json();
  const grid=document.getElementById("grid");

  data.drawings.forEach(d=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${d.dataUrl}">
    <div>${d.caption||""}</div>
    <div class="small">${new Date(d.createdAt).toLocaleString()}</div>`;
    grid.appendChild(div);
  });
}
load();
</script>

</body>
</html>
